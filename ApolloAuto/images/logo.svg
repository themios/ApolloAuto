<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" width="280" height="72" role="img" aria-label="Apollo Auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;800&amp;display=swap');
    </style>
  </defs>

  <!-- Diamond mark -->
  <g transform="translate(36, 36)">
    <!-- Outer diamond -->
    <polygon points="0,-26 18,0 0,26 -18,0" fill="#001775"/>
    <!-- Inner diamond highlight -->
    <polygon points="0,-16 11,0 0,16 -11,0" fill="#c8872a"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#001775"/>
  </g>

  <!-- APOLLO -->
  <text
    x="66"
    y="30"
    font-family="Sora, system-ui, sans-serif"
    font-size="26"
    font-weight="800"
    fill="#001775"
    letter-spacing="2"
  >APOLLO</text>

  <!-- AUTO -->
  <text
    x="67"
    y="52"
    font-family="Sora, system-ui, sans-serif"
    font-size="16"
    font-weight="600"
    fill="#c8872a"
    letter-spacing="5.5"
  >AUTO</text>

  <!-- Thin rule between mark and text -->
  <line x1="63" y1="18" x2="63" y2="56" stroke="#001775" stroke-width="1" opacity="0.2"/>
</svg>
