<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apollo Auto Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Karla:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1>Apollo Auto Admin</h1>
      <p>Sign in to manage blog posts, daily messages, specials, trends, and news.</p>
      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="username" />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" />
        <p id="login-error" class="error" hidden></p>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>
      <p class="login-foot"><a href="/">← Back to website</a></p>
    </div>
  </div>

  <div id="app" class="app" hidden>
    <header class="admin-header">
      <div class="admin-header-inner">
        <strong>Apollo Auto Admin</strong>
        <span id="admin-email" class="admin-email"></span>
        <button type="button" id="logout-btn" class="btn btn-outline">Log out</button>
      </div>
    </header>

    <div class="admin-layout">
      <nav class="admin-nav" aria-label="Content types">
        <button type="button" class="nav-tab active" data-type="blog">Blog articles</button>
        <button type="button" class="nav-tab" data-type="daily">Daily messages</button>
        <button type="button" class="nav-tab" data-type="special">Specials</button>
        <button type="button" class="nav-tab" data-type="trend">Trends</button>
        <button type="button" class="nav-tab" data-type="news">News</button>
      </nav>

      <main class="admin-main">
        <div class="admin-toolbar">
          <h1 id="panel-title">Blog articles</h1>
          <button type="button" id="new-btn" class="btn btn-primary">+ New</button>
        </div>

        <div class="admin-split">
          <section class="list-panel">
            <p id="list-empty" class="muted" hidden>No items yet.</p>
            <ul id="post-list" class="post-list"></ul>
          </section>

          <section class="editor-panel">
            <p id="editor-placeholder" class="muted">Select an item or create a new one.</p>
            <form id="editor-form" hidden>
              <input type="hidden" id="post-id" />
              <input type="hidden" id="post-type" />

              <label for="post-title">Title <span class="req">*</span></label>
              <input id="post-title" required />

              <div class="field-row slug-row" hidden>
                <label for="post-slug">URL slug (blog only)</label>
                <input id="post-slug" placeholder="auto-generated-from-title" />
              </div>

              <div class="field-row category-row" hidden>
                <label for="post-category">Category (blog only)</label>
                <input id="post-category" placeholder="Financing, Buyer's Guide…" />
              </div>

              <label for="post-excerpt">Short summary</label>
              <textarea id="post-excerpt" rows="2"></textarea>

              <label for="post-body">Full content (HTML allowed for blog)</label>
              <textarea id="post-body" rows="8"></textarea>

              <div class="field-row link-row" hidden>
                <label for="post-link">Link URL (optional)</label>
                <input id="post-link" type="url" placeholder="https://" />
              </div>

              <div class="field-row dates-row">
                <div>
                  <label for="post-published">Publish date</label>
                  <input id="post-published" type="datetime-local" />
                </div>
                <div class="expires-wrap" hidden>
                  <label for="post-expires">Expires (specials)</label>
                  <input id="post-expires" type="datetime-local" />
                </div>
              </div>

              <label class="checkbox-label">
                <input id="post-active" type="checkbox" checked />
                Active (visible on website)
              </label>

              <p id="editor-error" class="error" hidden></p>
              <div class="editor-actions">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" id="delete-btn" class="btn btn-danger" hidden>Delete</button>
              </div>
            </form>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
